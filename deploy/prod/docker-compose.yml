name: eco-knock-embedded-prod

services:
  server:
    image: ${IMAGE_NAME:-ghcr.io/jnu-econovation/eco-knock-be-embedded:latest}
    restart: unless-stopped
    user: "0:0"
    env_file:
      - ${APP_ENV_FILE:-.env}
    devices:
      - /dev/i2c-1:/dev/i2c-1
    volumes:
      - ./data:/app/data
    ports:
      - "${SERVER_HTTP_PORT}:${SERVER_HTTP_PORT}"
      - "${SERVER_GRPC_PORT}:${SERVER_GRPC_PORT}"

  node-exporter:
    image: quay.io/prometheus/node-exporter:latest
    command:
      - --path.rootfs=/host
      - --web.listen-address=:${NODE_EXPORTER_HTTP_PORT:-9100}
    network_mode: host
    pid: host
    restart: unless-stopped
    volumes:
      - /:/host:ro
